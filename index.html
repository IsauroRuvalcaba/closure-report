<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Closure Report</title>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="form-container">
      <div>
        <label for="sales">Sales</label>
        <input type="text" id="sales" />
      </div>
      <ul id="overring-list"></ul>
      <div>
        <input type="text" id="over-rings" />
        <button id="add-overring">Add Over-Ring</button>
      </div>
      <div>
        <div>Net Sales</div>
        <div id="net-sales">$0.00</div>
      </div>
      <ul id="expense-list"></ul>
      <div>
        <input type="text" id="expense" />
        <button id="add-expense">Add Expense Receipt</button>
      </div>
      <div>
        <div>Net Cash</div>
        <div id="net-cash">$0.00</div>
      </div>
      <div>
        <label for="credit-cards">Credit Card Amount</label>
        <input type="text" id="credit-cards" />
      </div>
      <div>
        <label for="total-cash">Total Cash</label>
        <input type="text" id="total-cash" />
      </div>

      <div>
        <div>Total Drawer</div>
        <div id="total-drawer"></div>
      </div>
      <div>
        <div>Discrepancy</div>
        <div id="discrepancy">$0.00</div>
      </div>
    </div>
  </body>
</html>
