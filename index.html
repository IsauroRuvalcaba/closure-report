<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Closure Report</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./app.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <h3>Closure Report</h3>
    <div class="form-container">
      <div class="input-group">
        <input type="text" id="sales" placeholder="" autocomplete="off" />
        <label for="sales">Sales</label>
      </div>
      <ul id="overring-list"></ul>
      <div class="exp-group">
        <input type="text" id="over-ring" placeholder="" autocomplete="off" />
        <label for="over-ring">Over Rings</label>
        <button class="exp-button" id="add-overring">+</button>
      </div>
      <div class="results">
        <div>Net Sales</div>
        <div id="net-sales">$0.00</div>
      </div>
      <ul id="expense-list"></ul>
      <div class="exp-group">
        <input type="text" id="expense" placeholder="" autocomplete="off" />
        <label for="over-ring">Reimbursed Expense</label>
        <button class="exp-button" id="add-expense">+</button>
      </div>
      <div class="results">
        <div>Net Cash</div>
        <div id="net-cash">$0.00</div>
      </div>
      <div class="input-group">
        <input
          type="text"
          id="credit-cards"
          placeholder=""
          autocomplete="off"
        />
        <label for="credit-cards">Credit Card Amount</label>
      </div>
      <div class="input-group">
        <input type="text" id="total-cash" placeholder="" autocomplete="off" />
        <label for="total-cash">Total Cash</label>
      </div>

      <div class="results">
        <div>Total Drawer</div>
        <div id="total-drawer">$0.00</div>
      </div>
      <div class="results difference">
        <div>Discrepancy</div>
        <div id="discrepancy">$0.00</div>
      </div>
    </div>
    <div class="keypad-container"></div>
  </body>
</html>
